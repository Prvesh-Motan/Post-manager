# Deploy static site to GitHub Pages (same layout as the official Jekyll template).
# This project is built with Vite, not Jekyll—the build output is uploaded from `dist`.

name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Project sites are served at https://<user>.github.io/<repo>/ — assets must use that prefix.
      # User/org site repo (<user>.github.io) is served at the domain root, so base is "/".
      - name: Set base path for GitHub Pages
        id: base
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          NAME_LC=$(printf '%s' "$NAME" | tr '[:upper:]' '[:lower:]')
          EXPECTED_LC=$(printf '%s' "${OWNER}.github.io" | tr '[:upper:]' '[:lower:]')
          if [ "$NAME_LC" = "$EXPECTED_LC" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$NAME/" >> "$GITHUB_OUTPUT"
          fi

      # Prefer CLI --base so the deploy always matches GitHub Pages (env alone can be missed).
      - name: Build with Vite
        run: npm run build -- --base="${{ steps.base.outputs.path }}"
        env:
          VITE_BASE_URL: ${{ steps.base.outputs.path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
